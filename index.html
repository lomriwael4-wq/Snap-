<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Connexion</title>

<style>

*{
box-sizing:border-box;
font-family:Arial;
}

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
overflow:hidden;

background:linear-gradient(-45deg,#ffe600,#8a2be2,#ffe600,#8a2be2);
background-size:400% 400%;
animation:bgmove 12s ease infinite;
}

@keyframes bgmove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* container */

.container{
width:340px;
padding:40px;
border-radius:30px;

background:rgba(255,255,255,0.15);
backdrop-filter:blur(25px);

box-shadow:
0 10px 40px rgba(0,0,0,0.4),
inset 0 0 20px rgba(255,255,255,0.2);

text-align:center;
}

/* logo */

.logo{
font-size:65px;
margin-bottom:10px;
}

/* inputs */

input{
width:100%;
padding:15px;
margin-bottom:14px;

border-radius:30px;
border:none;

background:rgba(255,255,255,0.25);
color:white;
font-size:15px;

transition:0.3s;
}

input::placeholder{
color:rgba(255,255,255,0.8);
}

input:focus{
outline:none;

background:rgba(255,255,255,0.35);

box-shadow:
0 0 10px white,
0 0 20px rgba(255,255,255,0.7);
}

/* button */

button{
width:100%;
padding:15px;

border:none;
border-radius:30px;

background:black;
color:white;
font-weight:bold;
font-size:16px;

cursor:pointer;
transition:0.25s;
}

button:hover{

transform:scale(1.05);

box-shadow:
0 0 15px black,
0 0 25px rgba(0,0,0,0.7);
}

/* hamburger */

.hamburger{
position:absolute;
top:20px;
left:20px;

font-size:28px;
cursor:pointer;
}

/* sidebar */

.sidebar{

position:fixed;
top:0;
left:-260px;

width:260px;
height:100%;

background:rgba(0,0,0,0.6);
backdrop-filter:blur(20px);

padding:30px;
transition:0.4s;

box-shadow:5px 0 25px rgba(0,0,0,0.5);
}

.sidebar h3{
margin-top:0;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;

margin-bottom:20px;
font-size:16px;
}

.sidebar.active{
left:0;
}

</style>
</head>

<body>

<div class="hamburger" onclick="toggleMenu()">☰</div>

<div id="sidebar" class="sidebar">

<h3>Menu</h3>

<a href="admin-login.html">🔐 Se connecter (Admin)</a>

</div>

<div class="container">

<div class="logo">👻</div>

<h2>Connexion</h2>

<input placeholder="Email ou pseudo">
<input type="password" placeholder="Mot de passe">

<button onclick="next()">Se connecter</button>

</div>

<script>

function next(){
window.location.href="info.html"
}

function toggleMenu(){

let sidebar=document.getElementById("sidebar")

sidebar.classList.toggle("active")

}

</script>

</body>
</html>
