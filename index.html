<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Connexion</title>

<style>

*{
box-sizing:border-box;
font-family:Arial;
}

:root{
--bg1:#ffe600;
--bg2:#8a2be2;
--box:rgba(255,255,255,0.15);
--text:white;
}

body.dark{
--bg1:#0f0f0f;
--bg2:#2c2c2c;
--box:rgba(255,255,255,0.08);
--text:white;
}

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:var(--text);
background:linear-gradient(-45deg,var(--bg1),var(--bg2),var(--bg1),var(--bg2));
background-size:400% 400%;
animation:bgmove 10s infinite;
}

@keyframes bgmove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.container{
width:320px;
padding:40px;
border-radius:25px;
background:var(--box);
backdrop-filter:blur(20px);
box-shadow:0 15px 40px rgba(0,0,0,0.4);
text-align:center;
}

.logo{
font-size:60px;
margin-bottom:10px;
}

h1{
margin-bottom:20px;
}

input{
width:100%;
padding:14px;
margin-bottom:12px;
border-radius:12px;
border:none;
background:rgba(255,255,255,0.2);
color:white;
font-size:15px;
transition:0.3s;
}

input::placeholder{
color:rgba(255,255,255,0.8);
}

input:focus{
outline:none;
box-shadow:0 0 12px white;
background:rgba(255,255,255,0.3);
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:black;
color:white;
font-weight:bold;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 15px black;
}

.theme{
position:absolute;
top:20px;
right:20px;
font-size:22px;
cursor:pointer;
}

.loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
color:white;
font-size:28px;
z-index:999;
transition:opacity 0.5s;
}

</style>
</head>

<body>

<div class="theme" onclick="toggleTheme()">🌙</div>

<div class="container">

<div class="logo">👻</div>

<h1>Connexion</h1>

<input type="text" placeholder="Email ou pseudo">
<input type="password" placeholder="Mot de passe">

<button onclick="next()">Se connecter</button>

</div>

<div id="loader" class="loader">
Chargement...
</div>

<script>

window.addEventListener("load",function(){

let loader=document.getElementById("loader")

setTimeout(()=>{
loader.style.opacity="0"

setTimeout(()=>{
loader.style.display="none"
},500)

},800)

})

function next(){

document.body.style.opacity="0"

setTimeout(()=>{
window.location.href="info.html"
},400)

}

function toggleTheme(){
document.body.classList.toggle("dark")
}

</script>

</body>
</html>
