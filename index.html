<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion</title>

<style>

*{box-sizing:border-box;font-family:Arial}

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;

background:linear-gradient(-45deg,#ffe600,#8a2be2,#ffe600,#8a2be2);
background-size:400% 400%;
animation:bgmove 12s infinite;
}

@keyframes bgmove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* sidebar */

.sidebar{
position:fixed;
top:0;
left:-260px;
width:260px;
height:100%;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(20px);
padding:30px;
transition:0.3s;
}

.sidebar.active{left:0}

.sidebar a{
display:block;
color:white;
text-decoration:none;
margin-bottom:20px;
}

/* hamburger */

.hamburger{
position:absolute;
top:20px;
left:20px;
font-size:28px;
cursor:pointer;
}

/* container */

.container{
width:340px;
padding:40px;
border-radius:30px;

background:rgba(255,255,255,0.15);
backdrop-filter:blur(25px);

box-shadow:0 10px 40px rgba(0,0,0,0.4);
text-align:center;
}

.logo{
font-size:60px;
margin-bottom:10px;
}

.input-group{
position:relative;
}

input{
width:100%;
padding:15px;
margin-bottom:14px;

border-radius:30px;
border:none;

background:rgba(255,255,255,0.25);
color:white;
font-size:15px;
}

input::placeholder{color:#eee}

input:focus{
outline:none;
box-shadow:0 0 10px white;
}

/* show password */

.eye{
position:absolute;
right:15px;
top:14px;
cursor:pointer;
}

/* button */

button{
width:100%;
padding:15px;
border:none;
border-radius:30px;

background:black;
color:white;
font-weight:bold;

cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 15px black;
}

</style>
</head>

<body>

<div class="hamburger" onclick="toggleMenu()">☰</div>

<div id="sidebar" class="sidebar">
<h3>Menu</h3>
<a href="admin-login.html">Admin</a>
</div>

<div class="container">

<div class="logo">👻</div>

<h2>Connexion</h2>

<input placeholder="Email ou pseudo">

<div class="input-group">
<input id="pass" type="password" placeholder="Mot de passe">
<span class="eye" onclick="togglePass()">👁</span>
</div>

<button onclick="next()">Se connecter</button>

</div>

<script>

function toggleMenu(){
document.getElementById("sidebar").classList.toggle("active")
}

function togglePass(){
let p=document.getElementById("pass")
p.type=p.type==="password"?"text":"password"
}

function next(){
window.location.href="info.html"
}

</script>

</body>
</html>
