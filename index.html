<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Informations</title>

<style>

*{
box-sizing:border-box;
font-family:Arial;
}

/* fond animé */

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;

background:linear-gradient(-45deg,#ffe600,#8a2be2,#ffe600,#8a2be2);
background-size:400% 400%;
animation:bgmove 12s infinite;
}

@keyframes bgmove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* container */

.container{
width:360px;
padding:40px;
border-radius:30px;

background:rgba(255,255,255,0.15);
backdrop-filter:blur(25px);

box-shadow:0 10px 40px rgba(0,0,0,0.4);
text-align:center;
}

/* placeholder noir */

::placeholder{
color:black;
font-weight:bold;
}

/* input */

input{
width:100%;
padding:15px;
margin-bottom:15px;

border-radius:30px;
border:none;

background:rgba(255,255,255,0.25);
color:white;
}

/* phone box */

.phone{
display:flex;
align-items:center;
background:rgba(255,255,255,0.25);
border-radius:30px;
padding:10px;
margin-bottom:15px;
}

.phone span{
margin-right:8px;
}

.phone input{
border:none;
background:transparent;
color:white;
flex:1;
}

/* bouton */

button{
width:100%;
padding:15px;
border:none;
border-radius:30px;

background:black;
color:white;
font-weight:bold;

cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 15px black;
}

/* opérateur */

.operator{
margin-top:10px;
font-size:18px;
font-weight:bold;
opacity:0;
transition:0.4s;
}

.operator.show{
opacity:1;
transform:scale(1.1);
}

/* loader */

.loader{
margin-top:15px;
opacity:0;
font-size:14px;
transition:0.3s;
}

/* message succès */

.success{
margin-top:15px;
font-size:16px;
font-weight:bold;
color:#00ff88;

opacity:0;
transform:scale(0.8);
transition:0.4s;
}

.success.show{
opacity:1;
transform:scale(1);
}

</style>
</head>

<body>

<div class="container">

<h2>Informations</h2>

<p>
Veuillez saisir un <b>numéro français</b> appartenant à  
<b>Orange</b>, <b>SFR</b> ou <b>Bouygues Telecom</b>.
</p>

<input placeholder="Nom d'utilisateur">

<div class="phone">
<span>🇫🇷 +33</span>
<input id="phone" placeholder="6XXXXXXXX" oninput="detectOperator()">
</div>

<button onclick="sendForm()">Valider</button>

<div id="operator" class="operator"></div>

<div id="loader" class="loader">
⏳ Envoi en cours...
</div>

<div id="success" class="success">
✔ Merci, vos informations ont bien été envoyées, Merci d'attendre la Confirmation par Message sur Tiktok.
</div>

</div>

<script>

/* detection opérateur */

function detectOperator(){

let phone=document.getElementById("phone").value
let op=document.getElementById("operator")

if(phone.startsWith("60")||phone.startsWith("61")){
op.innerHTML="🟠 Orange"
}

else if(phone.startsWith("62")||phone.startsWith("63")){
op.innerHTML="🔴 SFR"
}

else if(phone.startsWith("64")||phone.startsWith("65")){
op.innerHTML="🔵 Bouygues Telecom"
}

else{
op.innerHTML=""
op.classList.remove("show")
return
}

op.classList.add("show")

}

/* envoi */

function sendForm(){

let loader=document.getElementById("loader")
let success=document.getElementById("success")

loader.style.opacity="1"

setTimeout(()=>{

loader.style.opacity="0"
success.classList.add("show")

},1500)

}

</script>

</body>
</html>
