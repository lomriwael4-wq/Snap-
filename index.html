<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Informations</title>

<style>

*{
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

/* BACKGROUND */

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(-45deg,#ffe600,#8a2be2,#ffe600,#8a2be2);
background-size:400% 400%;
animation:bgmove 8s infinite;

color:white;
}

@keyframes bgmove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* CARD */

.container{

width:380px;
padding:45px;

border-radius:35px;

background:rgba(255,255,255,0.15);
backdrop-filter:blur(35px);

box-shadow:
0 20px 60px rgba(0,0,0,0.5),
inset 0 0 30px rgba(255,255,255,0.2);

text-align:center;

}

/* TITLE */

h2{
margin-bottom:10px;
font-size:28px;
}

/* TEXT */

.info{
font-size:15px;
line-height:1.6;
margin-bottom:30px;
}

/* INPUT STYLE */

input{

width:100%;
padding:16px;

border:none;
border-radius:40px;

background:rgba(255,255,255,0.25);

font-size:15px;

margin-bottom:18px;

transition:0.3s;

color:black;

}

/* PLACEHOLDER */

::placeholder{
color:black;
font-weight:bold;
}

/* LIQUID GLASS EFFECT */

input:focus{

outline:none;

background:white;

transform:scale(1.03);

box-shadow:
0 0 15px white,
0 0 30px rgba(255,255,255,0.9);

}

/* PHONE BOX */

.phone{

display:flex;
align-items:center;

background:rgba(255,255,255,0.25);

border-radius:40px;

padding:10px 15px;

margin-bottom:20px;

transition:0.3s;

}

/* FOCUS EFFECT */

.phone:focus-within{

background:white;

transform:scale(1.03);

box-shadow:
0 0 15px white,
0 0 30px rgba(255,255,255,0.9);

}

/* FLAG */

.flag{
font-size:22px;
margin-right:8px;
}

/* PREFIX */

.prefix{
margin-right:6px;
font-weight:bold;
color:black;
}

/* PHONE INPUT */

.phone input{
border:none;
background:transparent;
flex:1;
color:black;
}

/* BUTTON */

button{

width:100%;
padding:16px;

border:none;
border-radius:40px;

background:black;
color:white;

font-size:17px;
font-weight:bold;

cursor:pointer;

transition:0.3s;

}

/* BUTTON HOVER */

button:hover{

transform:scale(1.05);

box-shadow:
0 0 20px black,
0 0 30px rgba(0,0,0,0.5);

}

/* OPERATOR */

.operator{

margin-top:15px;

font-size:18px;
font-weight:bold;

opacity:0;

transition:0.4s;

}

.operator.show{
opacity:1;
transform:scale(1.1);
}

/* VALID CHECK */

.valid{

margin-top:10px;

font-size:22px;

color:#00ff88;

opacity:0;

transition:0.4s;

}

.valid.show{
opacity:1;
transform:scale(1.2);
}

/* LOGO */

.logo{
height:22px;
vertical-align:middle;
margin-right:6px;
}

/* LOADER */

.loader{
margin-top:15px;
opacity:0;
font-size:14px;
transition:0.3s;
}

/* SUCCESS */

.success{
margin-top:15px;
font-size:16px;
font-weight:bold;
color:#00ff88;

opacity:0;
transform:scale(0.8);
transition:0.4s;
}

.success.show{
opacity:1;
transform:scale(1);
}

</style>
</head>

<body>

<div class="container">

<h2>Informations</h2>

<p class="info">
Veuillez saisir un <b>numéro français</b> appartenant à  
<b>Orange</b>, <b>SFR</b> ou <b>Bouygues Telecom</b>.
</p>

<input id="username" placeholder="Nom d'utilisateur">

<div class="phone">

<span class="flag">🇫🇷</span>

<span class="prefix">+33</span>

<input id="phone" placeholder="6XXXXXXXX" oninput="detectOperator()">

</div>

<button onclick="sendForm()">Valider</button>

<div id="operator" class="operator"></div>

<div id="valid" class="valid">✔ Numéro valide</div>

<div id="loader" class="loader">
⏳ Envoi en cours...
</div>

<div id="success" class="success">
✔ Merci, vos informations ont bien été envoyées, Merci d'attendre la Confirmation par Message sur Tiktok.
</div>

</div>

<script>

function detectOperator(){

let phone=document.getElementById("phone").value
let op=document.getElementById("operator")
let valid=document.getElementById("valid")

if(phone.length < 2){
op.classList.remove("show")
valid.classList.remove("show")
return
}

if(phone.startsWith("60")||phone.startsWith("61")){

op.innerHTML='<img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/c/c8/Orange_logo.svg">Orange'

}

else if(phone.startsWith("62")||phone.startsWith("63")){

op.innerHTML='<img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/4/4f/SFR_2014_logo.svg">SFR'

}

else if(phone.startsWith("64")||phone.startsWith("65")){

op.innerHTML='<img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/6/66/Bouygues_Telecom_logo.svg">Bouygues Telecom'

}

else{

op.classList.remove("show")
valid.classList.remove("show")
return

}

op.classList.add("show")
valid.classList.add("show")

}

/* ENVOI */

function sendForm(){

let phone=document.getElementById("phone").value

if(phone.length<9){
return
}

let loader=document.getElementById("loader")
let success=document.getElementById("success")

loader.style.opacity="1"

setTimeout(()=>{

loader.style.opacity="0"
success.classList.add("show")

},1500)

}

</script>

</body>
</html>
