<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Connexion</title>

<style>

*{box-sizing:border-box;font-family:Arial;}

:root{
--bg1:#ffe600;
--bg2:#8a2be2;
--box:rgba(255,255,255,0.15);
--text:white;
}

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:var(--text);
background:linear-gradient(-45deg,var(--bg1),var(--bg2),var(--bg1),var(--bg2));
background-size:400% 400%;
animation:bgmove 10s infinite;
}

@keyframes bgmove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.menu-btn{
position:absolute;
top:20px;
left:20px;
font-size:28px;
cursor:pointer;
}

.menu{
position:absolute;
top:60px;
left:20px;
background:rgba(0,0,0,0.8);
padding:15px;
border-radius:10px;
display:none;
}

.menu a{
color:white;
text-decoration:none;
display:block;
}

.container{
width:320px;
padding:40px;
border-radius:25px;
background:var(--box);
backdrop-filter:blur(20px);
text-align:center;
}

input{
width:100%;
padding:14px;
margin-bottom:12px;
border-radius:12px;
border:none;
background:rgba(255,255,255,0.2);
color:white;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:black;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<div id="menu" class="menu">
<a href="admin-login.html">Se connecter (Admin)</a>
</div>

<div class="container">

<h1>Connexion</h1>

<input placeholder="Email ou pseudo">
<input type="password" placeholder="Mot de passe">

<button onclick="next()">Se connecter</button>

</div>

<script>

function next(){
window.location.href="info.html"
}

function toggleMenu(){
let menu=document.getElementById("menu")
menu.style.display=menu.style.display==="block"?"none":"block"
}

</script>

</body>
</html>
