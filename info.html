<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Informations</title>

<style>

*{
box-sizing:border-box;
font-family:Arial;
}

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#ffe600,#8a2be2,#ffe600,#8a2be2);
background-size:400% 400%;
animation:bgmove 10s infinite;
color:white;
}

@keyframes bgmove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* MENU */

.menu-btn{
position:absolute;
top:20px;
left:20px;
font-size:28px;
cursor:pointer;
}

.menu{
position:absolute;
top:60px;
left:20px;
background:rgba(0,0,0,0.8);
padding:15px;
border-radius:10px;
display:none;
}

.menu a{
color:white;
text-decoration:none;
display:block;
font-size:14px;
}

/* CONTAINER */

.container{
width:350px;
padding:40px;
border-radius:25px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(20px);
box-shadow:0 15px 40px rgba(0,0,0,0.4);
text-align:center;
}

h2{
margin-bottom:10px;
}

.info{
font-size:14px;
margin-bottom:20px;
}

/* champ téléphone */

.phone-box{
display:flex;
align-items:center;
background:rgba(255,255,255,0.2);
border-radius:12px;
padding:10px;
margin-bottom:12px;
}

.flag{
font-size:20px;
margin-right:8px;
}

.prefix{
margin-right:6px;
font-weight:bold;
}

.phone-box input{
border:none;
background:transparent;
color:white;
flex:1;
font-size:15px;
outline:none;
}

input{
width:100%;
padding:14px;
margin-bottom:12px;
border-radius:12px;
border:none;
background:rgba(255,255,255,0.2);
color:white;
}

input:focus{
box-shadow:0 0 12px white;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:black;
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

.operator{
margin-top:10px;
font-size:18px;
}

#message{
margin-top:10px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<div id="menu" class="menu">
<a href="admin-login.html">Se connecter (Admin)</a>
</div>

<div class="container">

<h2>Informations</h2>

<p class="info">
Veuillez entrer un <b>numéro mobile français</b> appartenant à  
<b>Orange</b>, <b>SFR</b> ou <b>Bouygues Telecom</b>.
</p>

<input id="username" placeholder="Nom d'utilisateur">

<div class="phone-box">
<span class="flag">🇫🇷</span>
<span class="prefix">+33</span>
<input id="phone" placeholder="6XXXXXXXX">
</div>

<button onclick="verifier()">Valider</button>

<div id="operator" class="operator"></div>

<p id="message"></p>

</div>

<script>

function toggleMenu(){

let menu=document.getElementById("menu")

if(menu.style.display==="block"){
menu.style.display="none"
}else{
menu.style.display="block"
}

}

function verifier(){

let phone=document.getElementById("phone").value
let msg=document.getElementById("message")
let operator=document.getElementById("operator")

if(phone.length!=9){
msg.innerHTML="Numéro invalide"
msg.style.color="red"
return
}

let prefix=phone.substring(0,2)

if(prefix=="60"||prefix=="61"){
operator.innerHTML="📞 Orange"
}

else if(prefix=="62"||prefix=="63"){
operator.innerHTML="📞 SFR"
}

else if(prefix=="64"||prefix=="65"){
operator.innerHTML="📞 Bouygues Telecom"
}

else{
operator.innerHTML="📞 Opérateur inconnu"
}

msg.innerHTML="Numéro valide ✅"
msg.style.color="lime"

}

</script>

</body>
</html>
