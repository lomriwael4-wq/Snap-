<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Informations</title>

<style>

*{
box-sizing:border-box;
font-family:Arial;
}

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;

background:linear-gradient(-45deg,#ffe600,#8a2be2,#ffe600,#8a2be2);
background-size:400% 400%;
animation:bgmove 12s ease infinite;
}

@keyframes bgmove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.container{
width:360px;
padding:40px;
border-radius:30px;

background:rgba(255,255,255,0.15);
backdrop-filter:blur(25px);

box-shadow:0 10px 40px rgba(0,0,0,0.4);
text-align:center;
}

.phone-box{
display:flex;
align-items:center;
background:rgba(255,255,255,0.25);
border-radius:30px;
padding:10px;
margin-bottom:15px;
}

.phone-box span{
margin-right:8px;
}

.phone-box input{
border:none;
background:transparent;
color:white;
flex:1;
}

input{
width:100%;
padding:15px;
margin-bottom:15px;
border-radius:30px;
border:none;
background:rgba(255,255,255,0.25);
color:white;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:30px;
background:black;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h2>Informations</h2>

<input id="username" placeholder="Nom d'utilisateur">

<div class="phone-box">
<span>🇫🇷 +33</span>
<input id="phone" placeholder="6XXXXXXXX">
</div>

<button onclick="verifier()">Valider</button>

<p id="message"></p>

</div>

<script>

function verifier(){

let username=document.getElementById("username").value
let phone=document.getElementById("phone").value
let msg=document.getElementById("message")

if(phone.length!=9){
msg.innerHTML="Numéro invalide"
msg.style.color="red"
return
}

let users = JSON.parse(localStorage.getItem("users")) || []

users.push({
username: username,
phone: "+33"+phone,
date: new Date().toLocaleString()
})

localStorage.setItem("users", JSON.stringify(users))

msg.innerHTML="Informations envoyées ✅"
msg.style.color="lime"

}

</script>

</body>
</html>
