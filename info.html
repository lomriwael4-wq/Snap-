<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Informations</title>

<style>

:root{
--bg1:#ffe600;
--bg2:#8a2be2;
--text:white;
--box:rgba(255,255,255,0.15);
}

body.dark{
--bg1:#0f0f0f;
--bg2:#2c2c2c;
--text:white;
--box:rgba(255,255,255,0.05);
}

body{
margin:0;
font-family:Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,var(--bg1),var(--bg2),var(--bg1),var(--bg2));
background-size:400% 400%;
animation:bgmove 10s infinite;
color:var(--text);
}

@keyframes bgmove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.container{
width:350px;
padding:40px;
border-radius:25px;
background:var(--box);
backdrop-filter:blur(20px);
box-shadow:0 15px 40px rgba(0,0,0,0.4);
text-align:center;
}

.flag{
font-size:30px;
}

.info{
font-size:14px;
margin-bottom:20px;
}

input{
width:100%;
padding:14px;
margin-bottom:12px;
border-radius:12px;
border:none;
background:rgba(255,255,255,0.2);
color:white;
transition:0.3s;
}

input:focus{
outline:none;
box-shadow:0 0 12px white;
background:rgba(255,255,255,0.3);
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:black;
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 15px black;
}

#message{
margin-top:10px;
font-weight:bold;
}

.theme{
position:absolute;
top:20px;
right:20px;
cursor:pointer;
font-size:20px;
}

</style>
</head>

<body>

<div class="theme" onclick="toggleTheme()">🌙</div>

<div class="container">

<div class="flag">🇫🇷</div>

<h2>Informations</h2>

<p class="info">
Veuillez entrer un <b>numéro de téléphone mobile français</b><br>
commençant par <b>+33</b> et appartenant à l’un des opérateurs suivants :  
<b>SFR</b>, <b>Bouygues Telecom</b> ou <b>Orange</b>.
</p>

<input id="username" placeholder="Nom d'utilisateur">
<input id="phone" placeholder="+33XXXXXXXXX">

<button onclick="verifier()">Valider</button>

<p id="message"></p>

</div>

<script>

function verifier(){

let phone=document.getElementById("phone").value
let msg=document.getElementById("message")

let regex=/^\+33[0-9]{9}$/

if(!regex.test(phone)){
msg.innerHTML="Numéro français invalide"
msg.style.color="red"
return
}

msg.innerHTML="Numéro valide ✅"
msg.style.color="lime"

}

function toggleTheme(){
document.body.classList.toggle("dark")
}

</script>

</body>
</html>
