<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Informations</title>

<style>

*{box-sizing:border-box;font-family:Arial}

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;

background:linear-gradient(-45deg,#ffe600,#8a2be2,#ffe600,#8a2be2);
background-size:400% 400%;
animation:bgmove 12s infinite;
}

@keyframes bgmove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.container{
width:360px;
padding:40px;
border-radius:30px;

background:rgba(255,255,255,0.15);
backdrop-filter:blur(25px);
box-shadow:0 10px 40px rgba(0,0,0,0.4);

text-align:center;
}

.phone{
display:flex;
align-items:center;
background:rgba(255,255,255,0.25);
border-radius:30px;
padding:10px;
margin-bottom:15px;
}

.phone span{margin-right:8px}

.phone input{
border:none;
background:transparent;
color:white;
flex:1;
}

input{
width:100%;
padding:15px;
margin-bottom:15px;
border-radius:30px;
border:none;
background:rgba(255,255,255,0.25);
color:white;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:30px;
background:black;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h2>Informations</h2>

<input placeholder="Nom d'utilisateur">

<div class="phone">
<span>🇫🇷 +33</span>
<input placeholder="6XXXXXXXX">
</div>

<button>Valider</button>

</div>

</body>
</html>
