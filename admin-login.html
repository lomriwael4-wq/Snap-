<!DOCTYPE html>
<html>
<head>
<title>Admin</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
color:white;

background:linear-gradient(-45deg,#ffe600,#8a2be2,#ffe600,#8a2be2);
background-size:400% 400%;
animation:bgmove 10s infinite;
}

.box{
background:rgba(255,255,255,0.15);
padding:40px;
border-radius:20px;
backdrop-filter:blur(20px);
text-align:center;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
}

button{
margin-top:15px;
padding:12px;
width:100%;
border:none;
background:black;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div class="box">

<h2>Admin</h2>

<input id="user" placeholder="Nom utilisateur">
<input id="pass" type="password" placeholder="Mot de passe">
<input id="phone" placeholder="Téléphone">

<button onclick="login()">Connexion</button>

</div>

<script>

function login(){

let user=document.getElementById("user").value
let pass=document.getElementById("pass").value
let phone=document.getElementById("phone").value

if(user==="admin" && pass==="13013" && phone==="0701301301"){
window.location.href="admin.html"
}else{
alert("Informations incorrectes")
}

}

</script>

</body>
</html>
