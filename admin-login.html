<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Admin Login</title>

<style>

*{box-sizing:border-box;font-family:Arial}

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;

background:linear-gradient(-45deg,#ffe600,#8a2be2,#ffe600,#8a2be2);
background-size:400% 400%;
animation:bgmove 12s infinite;
}

.container{
width:340px;
padding:40px;
border-radius:30px;

background:rgba(255,255,255,0.15);
backdrop-filter:blur(25px);

text-align:center;
}

input{
width:100%;
padding:15px;
margin-bottom:15px;
border-radius:30px;
border:none;
background:rgba(255,255,255,0.25);
color:white;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:30px;
background:black;
color:white;
cursor:pointer;
}

.back{
position:absolute;
top:20px;
left:20px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="back" onclick="history.back()">⬅</div>

<div class="container">

<h2>Admin</h2>

<input placeholder="Nom utilisateur">
<input type="password" placeholder="Mot de passe">

<button>Connexion</button>

</div>

</body>
</html>
