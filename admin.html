<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>

body{
margin:0;
font-family:Arial;
padding:40px;
color:white;

background:linear-gradient(-45deg,#ffe600,#8a2be2,#ffe600,#8a2be2);
background-size:400% 400%;
animation:bgmove 10s infinite;
}

.container{
background:rgba(255,255,255,0.15);
padding:30px;
border-radius:20px;
backdrop-filter:blur(20px);
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:12px;
border-bottom:1px solid rgba(255,255,255,0.3);
}

</style>
</head>

<body>

<div class="container">

<h1>Dashboard Admin</h1>

<table>

<thead>
<tr>
<th>Nom</th>
<th>Téléphone</th>
<th>Date</th>
</tr>
</thead>

<tbody id="userTable"></tbody>

</table>

</div>

<script>

let users = JSON.parse(localStorage.getItem("users")) || []

let table=document.getElementById("userTable")

users.forEach(user=>{

let row=`
<tr>
<td>${user.username}</td>
<td>${user.phone}</td>
<td>${user.date}</td>
</tr>
`

table.innerHTML+=row

})

</script>

</body>
</html>
