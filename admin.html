<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>

*{box-sizing:border-box;font-family:Arial}

body{
margin:0;
padding:40px;
color:white;

background:linear-gradient(-45deg,#ffe600,#8a2be2,#ffe600,#8a2be2);
background-size:400% 400%;
animation:bgmove 12s infinite;
}

.container{
background:rgba(255,255,255,0.15);
padding:30px;
border-radius:30px;
backdrop-filter:blur(25px);
}

.cards{
display:flex;
gap:20px;
margin-bottom:30px;
}

.card{
flex:1;
padding:20px;
border-radius:20px;
background:rgba(255,255,255,0.2);
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:12px;
border-bottom:1px solid rgba(255,255,255,0.3);
}

</style>
</head>

<body>

<div class="container">

<h1>Dashboard Admin</h1>

<div class="cards">

<div class="card">
<h3>Visites</h3>
<p>124</p>
</div>

<div class="card">
<h3>Utilisateurs</h3>
<p>38</p>
</div>

</div>

<table>

<tr>
<th>Nom</th>
<th>Téléphone</th>
<th>Date</th>
</tr>

<tr>
<td>Demo</td>
<td>+33 6 12 34 56 78</td>
<td>17:32</td>
</tr>

</table>

</div>

</body>
</html>
