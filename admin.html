<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Dashboard Admin</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(-45deg,#ffe600,#8a2be2,#ffe600,#8a2be2);
background-size:400% 400%;
animation:bgmove 10s infinite;
color:white;
padding:40px;
}

@keyframes bgmove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.container{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(20px);
padding:30px;
border-radius:20px;
max-width:900px;
margin:auto;
}

h1{
margin-bottom:20px;
}

.card{
background:rgba(255,255,255,0.2);
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

button{
padding:10px 20px;
border:none;
border-radius:10px;
background:black;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h1>Dashboard Admin</h1>

<div class="card">
📊 Statistiques du site  
<br><br>
Visites aujourd'hui : 0  
<br>
Utilisateurs inscrits : 0
</div>

<div class="card">
⚙️ Paramètres du site  
<br><br>
Modifier le texte du site  
<br>
Changer les couleurs
</div>

<button onclick="logout()">Se déconnecter</button>

</div>

<script>

function logout(){

window.location.href="index.html"

}

</script>

</body>
</html>
